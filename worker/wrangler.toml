name            = "kulturpulse-worker"
main            = "src/index.ts"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "0 */6 * * *",    # Ingest every 6 hours
  "*/30 * * * *",   # Geocode pass every 30 minutes
  "0 2 * * *",      # Geodata + location refresh at 2am daily
  "0 8 * * 1",      # Weekly digest — Monday 8am UTC
]

[[r2_buckets]]
binding     = "GEODATA"
bucket_name = "kulturpulse-geodata"

[[d1_databases]]
binding       = "DB"
database_name = "kulturpulse-db"
database_id   = "bf2f311c-ce80-43e2-8411-14aa544968f4"

[ai]
binding = "AI"

[vars]
KULTURDATEN_API_URL = "https://api-v2.kulturdaten.berlin/api"

# Secrets (set via: wrangler secret put SECRET_NAME)
# INGEST_SECRET    — random token to protect the manual /api/ingest endpoint
# ALLOWED_ORIGIN   — your Vercel deployment URL
# RESEND_API_KEY   — Resend API key for magic-link emails
# JWT_SECRET       — random 32+ char string for signing session JWTs
# FRONTEND_URL     — full URL of the Next.js app (e.g. https://kulturpulse.vercel.app)
