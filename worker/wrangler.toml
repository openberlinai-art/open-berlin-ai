name            = "citizen-berlin-worker"
main            = "src/index.ts"
compatibility_date  = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "0 * * * *",      # Ingest next 30 days — hourly
  "*/30 * * * *",   # Geocode pass every 30 min + push reminders + external sources at :30
  "0 2 * * *",      # Geodata + location refresh + POI Berlin + smart notifications — 2am daily
  "0 3 * * *",      # Full 365-day event sweep + POI Brandenburg (Wed) — 3am daily
  "0 8 * * 1",      # Weekly digest — Monday 8am UTC
]

[[r2_buckets]]
binding     = "GEODATA"
bucket_name = "citizen-berlin-geodata"

[[d1_databases]]
binding       = "DB"
database_name = "citizen-berlin-db"
database_id   = "bf2f311c-ce80-43e2-8411-14aa544968f4"

[ai]
binding = "AI"

[[vectorize]]
binding    = "VECTORIZE"
index_name = "citizen-berlin-pois"

[vars]
KULTURDATEN_API_URL = "https://api-v2.kulturdaten.berlin/api"

# Secrets (set via: wrangler secret put SECRET_NAME)
# INGEST_SECRET    — random token to protect the manual /api/ingest endpoint
# ALLOWED_ORIGIN   — your Vercel deployment URL
# RESEND_API_KEY   — Resend API key for magic-link emails
# JWT_SECRET       — random 32+ char string for signing session JWTs
# FRONTEND_URL     — full URL of the Next.js app (e.g. https://citizen-berlin.vercel.app)
# VAPID_PUBLIC_KEY      — VAPID public key for web push notifications
# VAPID_PRIVATE_KEY     — VAPID private key for web push notifications
# TICKETMASTER_API_KEY  — Ticketmaster Discovery API key
# SONGKICK_API_KEY      — Songkick API key
